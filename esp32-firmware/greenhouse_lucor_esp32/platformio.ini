; PlatformIO project for the ESP32 irrigation/greenhouse controller.
; Build:  pio run
; Upload: pio run -t upload   (or use the OTA flow via /api/firmware/* on the backend)
;
; The sketch file is esp32-firmware/greenhouse_lucor_esp32/greenhouse_lucor_esp32.ino
; (filename matches the folder — Arduino IDE compatible too).

[platformio]
default_envs = esp32dev

; The .ino lives at the project root (Arduino IDE folder-name convention).
; Tell PlatformIO to compile sources from the project root instead of `src/`.
src_dir = .

[env:esp32dev]
platform        = espressif32@^6.7.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

; OTA-friendly partition table so /api/firmware/deploy (HTTPUpdate) works at runtime.
board_build.partitions = default.csv
board_build.filesystem  = spiffs

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^6.21.5
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SHT4x Library @ ^1.0.3

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
