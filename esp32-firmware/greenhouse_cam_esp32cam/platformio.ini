; PlatformIO project for the ESP32-CAM (AI Thinker) greenhouse camera.
; Build:  pio run -d esp32-firmware/greenhouse_cam_esp32cam
; Upload: pio run -d esp32-firmware/greenhouse_cam_esp32cam -t upload
;         (or use the OTA flow via /api/firmware/* with device=camera)
;
; The sketch file is esp32-firmware/greenhouse_cam_esp32cam/greenhouse_cam_esp32cam.ino
; (filename matches the folder — Arduino IDE compatible too).
;
; NOTE on partition scheme: the chip on the field already has an OTA-capable
; partition table (we confirmed OTA works remotely). We deliberately do NOT
; set board_build.partitions here so PlatformIO doesn't try to reflash the
; partition table on `pio run -t upload` — preserving the working OTA slots.
; The committed build.options.json mentions "huge_app" but that is stale
; Arduino IDE metadata, not what's actually flashed on the chip.

[platformio]
default_envs = esp32cam

; The .ino lives at the project root (Arduino IDE folder-name convention).
; Tell PlatformIO to compile sources from the project root instead of `src/`.
src_dir = .

[env:esp32cam]
platform        = espressif32@^6.7.0
board           = esp32cam
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

; PSRAM is on the AI Thinker ESP32-CAM board — enable it explicitly so the
; camera driver uses CAMERA_FB_IN_PSRAM (double buffer, larger frames).
build_flags =
    -DBOARD_HAS_PSRAM
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
